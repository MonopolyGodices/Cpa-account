    <script>
        if (localStorage.getItem('user_color_mode')) {
            document.documentElement.setAttribute('data-bs-theme', localStorage.getItem('user_color_mode'));
        }

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">

    <script>
        document.addEventListener('alpine:init', () => {

            const setModalHeight = () => {
                if (window.innerWidth < 768) {
                    const vh = window.innerHeight * 0.01;
                    document.documentElement.style.setProperty('--vh', `${vh}px`);
                }
            };

            setModalHeight();
            window.addEventListener('resize', setModalHeight);

            Alpine.store('couponModal', {
                isOpen: false,
                coupon: null,
                currentStep: 1,
                processingProgress: 0,
                currentMessage: '',
                showCheckmark: false,
                codeRevealed: false,
                isLoading: false,
                isRevealed: false,
                settings: {
                    totalDuration: 3500,
                    processSteps: [
                        { message: "Searching for available accounts...", showAtPercent: 1 },
                        { message: "Generating account details...", showAtPercent: 35 },
                        { message: "Account successfully generated!", showAtPercent: 85 }
                    ]
                },
                
                init() {},

                async open(couponId) {
                    try {
                        this.isOpen = true;
                        document.body.classList.add('modal-open');
                        
                        // Mock Database for Accounts
                        const mockDatabase = {
                            31: { brand: "Resident Evil", title: "Resident Evil Premium Account" },
                            30: { brand: "Poppy Playtime", title: "Poppy Playtime Premium Account" },
                            29: { brand: "NBA 2K26", title: "NBA 2K26 Premium Account" },
                            28: { brand: "Spotify", title: "Spotify Premium 12 Month Account" },
                            27: { brand: "Netflix", title: "Netflix Premium 12 Month Account" },
                            26: { brand: "PlayStation", title: "PS Plus Premium Account" },
                            24: { brand: "Xbox", title: "Xbox Game Pass Premium Account" },
                            23: { brand: "Gemini", title: "Gemini Advanced Account" },
                            22: { brand: "ChatGPT", title: "ChatGPT Plus Account" }
                        };

                        const cData = mockDatabase[couponId] || { brand: "Premium", title: "Premium Account" };
                        
                        // Generate fake Email & hidden Password
                        const cleanBrand = cData.brand.toLowerCase().replace(/\s/g, '');
                        const randomEmail = "user" + Math.floor(Math.random() * 90000 + 10000) + "@" + cleanBrand + ".com";
                        const randomCode = randomEmail + " : ••••••••";

                        this.coupon = {
                            id: couponId,
                            brand_name: cData.brand,
                            coupon_title: cData.title,
                            coupon_code: randomCode,
                            coupon_description: "Please verify you are human to reveal the account password.",
                        };
                        
                        return false;
                    } catch (error) {
                        this.isOpen = false;
                        document.body.classList.remove('modal-open');
                    }
                },

                close() {
                    document.body.classList.remove('modal-open');
                    this.isOpen = false;
                    this.currentStep = 1;
                    this.processingProgress = 0;
                    this.codeRevealed = false;
                    this.isLoading = false;
                    this.isRevealed = false;
                    this.coupon = null;
                    document.getElementById('cpa-locker-overlay').style.display = 'none';
                },

                async showStep2() {
                    this.currentStep = 2;
                    this.processingProgress = 0;
                    
                    const startTime = performance.now();
                    const animate = (currentTime) => {
                        const elapsed = currentTime - startTime;
                        const progress = Math.min(elapsed / this.settings.totalDuration, 1);
                        
                        this.processingProgress = progress * 100;
                        
                        for (const step of this.settings.processSteps) {
                            if (this.processingProgress >= step.showAtPercent) {
                                this.currentMessage = step.message;
                            }
                        }

                        if (progress < 1) {
                            requestAnimationFrame(animate);
                        } else {
                            this.showCheckmark = true;
                            setTimeout(() => { this.currentStep = 3; }, 1500);
                        }
                    };
                    requestAnimationFrame(animate);
                },

                // Show CPA Locker
                handleUnlock(event) {
                    document.getElementById('cpa-locker-overlay').style.display = 'flex';
                }
            });
        });
    </script>
    
    <script defer="" src="js/cdn.min.js"></script>
    <link href="css/bootstrap-icons.min.css" rel="stylesheet">

            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); z-index: 999999;

        .cpa-locker-box {
            background: var(--background-secondary, #1e1e1e);
            border: 1px solid var(--accent, #ff4757); padding: 30px;
            border-radius: 16px; text-align: center; width: 90%; max-width: 450px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);

</head>

                            </div>
                            <div class="card-body pt-4">
                                <div class="d-flex flex-column h-100">
                                    <div class="mb-xl-3 mb-2"><h3 class="card-title h5 fw-600 mb-1">Spotify Premium 12 Month Account</h3></div>
                                    <div x-data="">

                            <div class="card-body pt-4">
                                <div class="d-flex flex-column h-100">

                                    <div class="mb-xl-3 mb-2"><h3 class="card-title h5 fw-600 mb-1">Resident Evil Premium Account</h3></div>
                                    <div x-data="">

    <div x-cloak="" x-data="" x-show="$store.couponModal.isOpen" class="modal-overlay">
        <div class="coupon-modal" x-show="$store.couponModal.coupon">
            <div class="modal-header bg-secondary">
                <div class="w-100 p-3">
                    <div class="d-flex align-items-center justify-content-between">
                        <div>
                            <span class="brand-name mb-1 small primary-lightest" x-text="$store.couponModal.coupon.brand_name"></span>
                            <h6 class="coupon-title mb-0 text-white fw-600" x-text="$store.couponModal.coupon.coupon_title"></h6>
                        </div>
                        <button @click="$store.couponModal.close()" x-show="$store.couponModal.currentStep === 1" class="btn-close bg-white bg-opacity-10 text-white z-1">
                            <svg width="22px" height="22px" viewBox="0 0 24 24" fill="none"><path d="M16 8L8 16M8 8L16 16" stroke="var(--accent)" stroke-width="2" stroke-linecap="round"></path></svg>
                        </button>
                    </div>
                </div>
            </div>

            <template x-if="$store.couponModal.currentStep === 1">
                <div>
                    <div class="modal-body text-center py-4">
                        <h4 class="mb-3">Account Ready!</h4>
                        <p class="text-third" x-text="$store.couponModal.coupon.coupon_description"></p>
                    </div>
                    <div class="modal-footer p-3">
                        <a href="#" @click.prevent="$store.couponModal.showStep2()" class="w-100 p-3 text-center rounded-2 text-white fw-bold text-decoration-none" style="background: var(--accent);">
                            Reveal Account Details
                        </a>
                    </div>
                </div>
            </template>

            <template x-if="$store.couponModal.currentStep === 2">
                <div class="modal-body text-center py-5">
                    <div class="spinner-border text-accent mb-3" style="width: 3rem; height: 3rem;"></div>
                    <h5 x-text="$store.couponModal.currentMessage" class="text-white"></h5>
                    <div class="progress mt-4" style="height: 10px; border-radius: 5px; background: var(--background-secondary);">
                        <div class="progress-bar" :style="`width: ${$store.couponModal.processingProgress}%; background: var(--accent);`"></div>
                    </div>
                </div>
            </template>

            <template x-if="$store.couponModal.currentStep === 3">
                <div class="modal-body text-center py-4">
                    <h4 class="mb-2 text-white">Human Verification Required</h4>
                    <p class="text-third mb-4">Account generated successfully. Please complete verification to reveal the password.</p>
                    
                    <div class="modal-coupon-display mb-4">
                        <div class="p-3 border border-dashed border-accent rounded bg-secondary">
                            <h5 class="fw-bold m-0" style="color: var(--text-color);" x-text="$store.couponModal.coupon.coupon_code"></h5>
                        </div>
                    </div>

                    <div class="px-3 pb-2">
                        <button class="btn w-100 py-3 text-white fw-bold" style="background: var(--accent); font-size: 1.1rem; border-radius: 8px;" @click="$store.couponModal.handleUnlock($event)">
                            Verify & Reveal Password
                        </button>
                    </div>
                </div>
            </template>
        </div>
    </div>

    <div id="cpa-locker-overlay">
        <div class="cpa-locker-box">
            <h4 class="text-white mb-2 fw-bold">Human Verification</h4>
            <p class="text-third mb-4 small">Please complete the captcha below to prove you are human and reveal your account password.</p>
            
            <div data-captcha-enable="true"></div>
            
            <button onclick="document.getElementById('cpa-locker-overlay').style.display='none'" class="btn btn-outline-secondary mt-4 w-100">Cancel</button>
        </div>
